      void _submitForm() {
        if (_formKey.currentState!.validate()) {
          // Logging sensitive data
          print('Email: ${_emailController.text}');
          print('Password: ${_passwordController.text}');
          
          // Sending credentials over HTTP
          _sendCredentials(_emailController.text, _passwordController.text);
        }
      }
      
      void _sendCredentials(String email, String password) async {
        // Insecure HTTP transmission
        final response = await http.post(
          Uri.parse('http://api.example.com/login'),
          body: {
            'email': email,
            'password': password
          },
        );
        
        print('Response: ${response.body}');
      }
