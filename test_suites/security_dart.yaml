    class FileHandlingVulnerabilities {
      
      Future<void> saveUserFile(String filename, String content) async {
        // Path traversal vulnerability
        final directory = await getApplicationDocumentsDirectory();
        final file = File('${directory.path}/$filename');
        
        await file.writeAsString(content);
      }
      
      Future<String> loadUserFile(String filename) async {
        // No access control on file reading
        final directory = await getApplicationDocumentsDirectory();
        final file = File('${directory.path}/$filename');
        
        return await file.readAsString();
      }
      
      Future<void> processUploadedImage(String imagePath) async {
        // No file type validation
        final file = File(imagePath);
        final bytes = await file.readAsBytes();
        
        // Processing file without validation
        _processImageData(bytes);
      }
      
