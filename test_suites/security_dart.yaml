- id: dart_web_vulnerabilities
  prompt: |
    Analyze this Dart web application security vulnerability:

    import 'dart:html';
    import 'dart:convert';
    import 'dart:js';

    class WebSecurityVulnerabilities {
      
      void handleUserInput() {
        final userInput = querySelector('#userInput') as InputElement;
        final output = querySelector('#output') as DivElement;
        
        // XSS vulnerability - directly inserting user input
        output.innerHtml = '<p>Hello ${userInput.value}</p>';
      }
      
      void loadExternalScript(String scriptUrl) {
        // Loading external scripts without validation
        final script = ScriptElement()
          ..src = scriptUrl
          ..type = 'text/javascript';
        document.head!.children.add(script);
      }
      
      void makeAjaxRequest(String url) {
        // CORS bypass and SSRF vulnerability
        HttpRequest.getString(url).then((responseText) {
          final output = querySelector('#response') as DivElement;
          output.innerHtml = responseText; // XSS through response
        });
      }
      
      void executeUserJS(String jsCode) {
        // Code injection through JavaScript interop
        final jsFunction = context['eval'];
        jsFunction.apply([jsCode]);
      }
      
      void processFormData() {
        final form = querySelector('#dataForm') as FormElement;
        final formData = FormData(form);
        
        // No CSRF protection
        final url = '/api/updateUser';
        HttpRequest.postFormData(url, formData).then((response) {
          querySelector('#result')!.text = 'User updated';
        });
      }
      
      void redirectUser(String targetUrl) {
        // Open redirect vulnerability
        window.location.href = targetUrl;
      }
      
      void handleWebSocket() {
        final wsUrl = querySelector('#wsUrl') as InputElement;
        
        // WebSocket connection without origin validation
        final webSocket = WebSocket(wsUrl.value!);
        
        webSocket.onMessage.listen((MessageEvent e) {
          // Processing messages without validation
          final data = json.decode(e.data);
          executeCommand(data['command']);
        });
      }
      
      void executeCommand(String command) {
        // Simulated command execution
        print('Executing: $command');
      }
      
      void storeDataLocally(String sensitiveData) {
        // Storing sensitive data in localStorage
        window.localStorage['userToken'] = sensitiveData;
        window.localStorage['creditCard'] = '4111-1111-1111-1111';
      }
      
      void loadUserContent(String htmlContent) {
        final container = querySelector('#userContent') as DivElement;
        
        // DOM-based XSS
        container.setInnerHtml(htmlContent, 
            validator: NodeValidatorBuilder.common()..allowSvg());
      }
    }

    class InsecureCommunication {
      
      Future<String> sendCredentials(String username, String password) async {
        // Sending credentials over HTTP
        final url = 'http://api.example.com/login';
        final response = await HttpRequest.postFormData(url, {
          'username': username,
          'password': password
        });
        
        return response.responseText ?? '';
      }
      
      void setupWebRTC() {
        // WebRTC without security considerations
        final configuration = {
          'iceServers': [
            {'urls': 'stun:stun.l.google.com:19302'},
            {'urls': 'turn:turn.example.com', 'username': 'user', 'credential': 'pass'}
          ]
        };
        
        // No validation of peer connections
        final peerConnection = context['RTCPeerConnection'].callMethod('apply', [configuration]);
      }
    }
  criteria:
    - 'xss.*prevention|input.*sanitization'
    - 'csrf.*protection|same.*origin.*policy'
    - 'script.*injection|code.*execution'
    - 'https.*only|secure.*communication'
    - 'origin.*validation|cors.*security'
  must_not:
    - 'innerhtml.*user.*input.*safe'
    - 'http.*secure.*enough'
  json: false

- id: flutter_platform_channel_vulnerabilities
  prompt: |
    Review this Flutter platform channel security vulnerability:

    import 'package:flutter/services.dart';
    import 'dart:typed_data';

    class PlatformChannelVulnerabilities {
      static const platform = MethodChannel('com.example.app/security');
      
      Future<void> executeSystemCommand(String command) async {
        try {
          // Passing user input directly to native code
          await platform.invokeMethod('executeCommand', {'command': command});
        } on PlatformException catch (e) {
          print('Command execution failed: ${e.message}');
        }
      }
      
      Future<String> readFile(String filePath) async {
        // Path traversal vulnerability through platform channel
        try {
          final result = await platform.invokeMethod('readFile', {'path': filePath});
          return result.toString();
        } catch (e) {
          return 'Error reading file: $e';
        }
      }
      
      Future<void> saveCredentials(String username, String password) async {
        // Sending sensitive data to native code without encryption
        await platform.invokeMethod('saveCredentials', {
          'username': username,
          'password': password
        });
      }
      
      Future<void> processUserData(Map<String, dynamic> userData) async {
        // Passing unvalidated user data to native code
        await platform.invokeMethod('processData', userData);
      }
      
      Future<Uint8List> decryptData(Uint8List encryptedData, String key) async {
        // Passing encryption keys through platform channel
        final result = await platform.invokeMethod('decrypt', {
          'data': encryptedData,
          'key': key
        });
        return result as Uint8List;
      }
      
      void setupEventChannel() {
        const eventChannel = EventChannel('com.example.app/events');
        
        eventChannel.receiveBroadcastStream().listen((event) {
          // Processing events from native code without validation
          if (event['type'] == 'command') {
            executeCommand(event['data']);
          } else if (event['type'] == 'url') {
            _launchUrl(event['url']);
          }
        });
      }
      
      void _launchUrl(String url) {
        // URL launching without validation
        platform.invokeMethod('launchUrl', {'url': url});
      }
      
      Future<void> sendSMS(String phoneNumber, String message) async {
        // SMS sending without user consent validation
        await platform.invokeMethod('sendSMS', {
          'number': phoneNumber,
          'message': message
        });
      }
      
      Future<void> accessContacts() async {
        // Accessing sensitive data without proper permission checks
        final contacts = await platform.invokeMethod('getContacts');
        // Processing contacts without user consent
        _uploadContacts(contacts);
      }
      
      void _uploadContacts(dynamic contacts) {
        // Uploading user data without explicit consent
        platform.invokeMethod('uploadData', {'contacts': contacts});
      }
    }

    // Native side example (Android Kotlin) - for context
    /*
    // MainActivity.kt - Vulnerable implementation
    class MainActivity: FlutterActivity() {
        override fun configureFlutterEngine(flutterEngine: FlutterEngine) {
            super.configureFlutterEngine(flutterEngine)
            
            MethodChannel(flutterEngine.dartExecutor.binaryMessenger, CHANNEL).setMethodCallHandler { call, result ->
                when (call.method) {
                    "executeCommand" -> {
                        val command = call.argument<String>("command")
                        // Command injection vulnerability
                        Runtime.getRuntime().exec(command)
                        result.success("Command executed")
                    }
                    "readFile" -> {
                        val path = call.argument<String>("path")
                        // Path traversal vulnerability
                        val content = File(path).readText()
                        result.success(content)
                    }
                    "saveCredentials" -> {
                        val username = call.argument<String>("username")
                        val password = call.argument<String>("password")
                        // Storing in plain text
                        getSharedPreferences("creds", Context.MODE_PRIVATE)
                            .edit()
                            .putString("user", username)
                            .putString("pass", password)
                            .apply()
                        result.success("Saved")
                    }
                }
            }
        }
    }
    */
  criteria:
    - 'platform.*channel.*security|input.*validation'
    - 'command.*injection.*prevention|path.*traversal'
    - 'sensitive.*data.*encryption|secure.*storage'
    - 'permission.*validation|user.*consent'
    - 'native.*code.*security|bridge.*validation'
  must_not:
    - 'platform.*channels.*always.*secure'
