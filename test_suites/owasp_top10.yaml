- id: owasp_risk_assessment
  prompt: |
    Compare the risk levels of these OWASP Top 10 2021 vulnerabilities:
    1. SQL Injection
    2. Broken Access Control  
    3. Cryptographic Failures
    
    Rank them by exploitability and business impact.
  criteria:
    - 'exploitability|business.*impact'
    - 'broken.*access.*control.*high|access.*control.*critical'
    - 'sql.*injection.*high|injection.*high'
    - 'cryptographic.*failures|crypto.*failures'
    - 'prevalence|detectability|technical.*impact'
  must_not: []
  json: false