- id: python_ldap_injection
  prompt: |
    Analyze this LDAP query construction:

    import ldap

    def authenticate_user(username, password):
        search_filter = f"(&(uid={username})(userPassword={password}))"
        
        conn = ldap.initialize("ldap://localhost")
        result = conn.search_s(
            "ou=users,dc=example,dc=com",
            ldap.SCOPE_SUBTREE,
            search_filter
        )
        return len(result) > 0

    def find_users(search_term):
        filter_string = f"(|(cn=*{search_term}*)(mail=*{search_term}*))"
        conn = ldap.initialize("ldap://localhost")
        return conn.search_s("ou=users,dc=example,dc=com", ldap.SCOPE_SUBTREE, filter_string)
  criteria:
    - 'ldap.*injection|filter.*injection'
    - 'search.*filter.*user.*input|ldap.*query.*user.*input'
    - 'ldap.*escape|input.*sanitization'
    - 'ldap3.*escape|escape.*filter.*chars'
    - 'special.*characters.*ldap'
  must_not:
    - 'ldap.*escape|escape.*filter'
  json: false

- id: python_timing_attacks
  prompt: |
    Review this authentication timing:

    import time
    import hmac
    import hashlib

    def verify_password(provided, stored):
        return provided == stored

    def check_api_key(provided_key, valid_key):
        if len(provided_key) != len(valid_key):
            return False
        
        for i, char in enumerate(provided_key):
            if char != valid_key[i]:
                return False
        return True

    def validate_token(token, secret):
        expected = hashlib.sha256((secret + token).encode()).hexdigest()
        return token == expected

    def authenticate_hmac(message, signature, key):
        expected = hmac.new(key.encode(), message.encode(), hashlib.sha256).hexdigest()
        return signature == expected
  criteria:
    - 'timing.*attack|constant.*time.*comparison'
    - 'side.*channel.*attack|character.*by.*character'
    - 'hmac\.compare_digest|secrets\.compare_digest'
    - 'early.*return|timing.*leak'
    - 'cryptographic.*comparison'
  must_not:
    - 'compare_digest'
    - 'constant.*time'
  json: false

