- id: python_weak_crypto
  prompt: |
    Review this cryptographic implementation:

    import hashlib
    import random
    import string

    def hash_password(password):
        return hashlib.md5(password.encode()).hexdigest()

    def generate_session_token():
        return ''.join(random.choice(string.ascii_letters) for _ in range(32))

    def encrypt_data(data, key):
        # Simple XOR encryption
        result = []
        for i, char in enumerate(data):
            result.append(chr(ord(char) ^ ord(key[i % len(key)])))
        return ''.join(result)

    def create_api_key():
        import time
        seed = int(time.time())
        random.seed(seed)
        return random.randint(100000, 999999)
  criteria:
    - 'weak.*hash|md5.*weak|sha1.*weak'
    - 'random\.choice.*security|predictable.*random'
    - 'XOR.*encryption|weak.*encryption'
    - 'bcrypt|scrypt|argon2|PBKDF2'
    - 'secrets\.token_hex|cryptographically.*secure'
  must_not:
    - 'bcrypt|scrypt|argon2'
    - 'secrets\.'
  json: false

