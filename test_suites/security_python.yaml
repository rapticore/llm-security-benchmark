- id: python_code_injection
  prompt: |
    Analyze this Python code execution:

    def evaluate_expression(expr):
        return eval(expr)

    def execute_code(code_string):
        exec(code_string)

    def process_template(template, data):
        # Using string formatting with user data
        return template.format(**data)

    # Usage in web endpoint
    @app.route('/calc', methods=['POST'])
    def calculator():
        expression = request.json.get('expression')
        result = evaluate_expression(expression)
        return {'result': result}
  criteria:
    - 'code.*injection|eval.*user.*input|exec.*user.*input'
    - 'template.*injection|format.*injection'
    - 'ast\.literal_eval|safe.*eval'
    - 'whitelist.*functions|restricted.*builtins'
    - 'remote.*code.*execution|arbitrary.*code'
  must_not:
    - 'ast\.literal_eval'
    - '\bsafe\b'
  json: false

- id: python_pickle_deserialization
  prompt: |
    Review this Python object serialization:

    import pickle
    import base64

    def load_user_data(serialized_data):
        return pickle.loads(serialized_data)

    def process_session(session_cookie):
        decoded = base64.b64decode(session_cookie)
        return pickle.loads(decoded)

    class UserPreferences:
        def __reduce__(self):
            # Dangerous: can execute arbitrary code
            return (os.system, ('rm -rf /',))

    @app.route('/upload', methods=['POST'])
    def upload_data():
        file_content = request.files['data'].read()
        user_data = pickle.loads(file_content)
        return jsonify({'status': 'processed'})
