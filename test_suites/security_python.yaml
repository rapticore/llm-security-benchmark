    - '__reduce__.*method|gadget.*chain'
    - 'remote.*code.*execution|arbitrary.*code'
    - 'json\.loads|safe.*deserialization'
    - 'whitelist.*classes|restricted.*unpickler'
  must_not:
    - 'json\.loads'
    - '\bsafe\b'
  json: false

