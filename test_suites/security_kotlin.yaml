- id: kotlin_broadcast_receiver_vulnerabilities
  prompt: |
    Review this Kotlin BroadcastReceiver security issue:

    class DataReceiver : BroadcastReceiver() {
        
        override fun onReceive(context: Context, intent: Intent) {
            when (intent.action) {
                "com.example.USER_DATA" -> {
                    // Processing sensitive data from broadcast
                    val userData = intent.getStringExtra("user_data")
                    val password = intent.getStringExtra("password")
                    
                    // Storing without validation
                    saveUserData(context, userData, password)
                }
                
                "com.example.EXECUTE_COMMAND" -> {
                    // Command execution from broadcast
                    val command = intent.getStringExtra("command")
                    Runtime.getRuntime().exec(command)
                }
                
                "com.example.SEND_SMS" -> {
                    // SMS sending without permission check
                    val number = intent.getStringExtra("phone")
                    val message = intent.getStringExtra("message")
                    sendSMS(number, message)
                }
            }
        }
        
        private fun saveUserData(context: Context, userData: String?, password: String?) {
            val prefs = context.getSharedPreferences("user_data", Context.MODE_PRIVATE)
            prefs.edit().apply {
                putString("data", userData)
                putString("pass", password)
                apply()
            }
        }
        
        private fun sendSMS(number: String?, message: String?) {
            val smsManager = SmsManager.getDefault()
            smsManager.sendTextMessage(number, null, message, null, null)
        }
    }
    
    // Manifest registration - exported receiver
    /*
    <receiver android:name=".DataReceiver" 
              android:exported="true">
        <intent-filter>
            <action android:name="com.example.USER_DATA" />
            <action android:name="com.example.EXECUTE_COMMAND" />
        </intent-filter>
    </receiver>
    */
    
    class SecureBroadcastSender {
        fun sendUserData(context: Context, userData: String) {
            // Sending sensitive data via broadcast
            val intent = Intent("com.example.USER_DATA").apply {
                putExtra("user_data", userData)
                putExtra("password", "secret123")
            }
            context.sendBroadcast(intent)  // Public broadcast
        }
    }
