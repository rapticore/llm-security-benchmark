            // Incomplete SQL injection prevention
            return input.replace("'", "''")
                       .replace("--", "")
        }
        
        private fun getUserRoles(userId: String): List<String> {
            // Mock implementation
            return when (userId) {
                "user1" -> listOf("user")
                "admin" -> listOf("admin", "user")
                else -> listOf("guest")
            }
        }
    }
    
    class FileProcessor {
        
        fun processUploadedFile(file: MultipartFile) {
            val filename = file.originalFilename ?: "unknown"
            
            // Path traversal vulnerability
