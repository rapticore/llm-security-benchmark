- id: kotlin_insecure_serialization
  prompt: |
    Review this Kotlin insecure serialization:

    import java.io.*
    import kotlinx.serialization.*
    import kotlinx.serialization.json.*
    import com.google.gson.Gson
    
    @Serializable
    data class User(val name: String, val email: String)
    
    class SerializationManager {
        
        fun serializeWithJava(obj: Any): ByteArray {
            val byteStream = ByteArrayOutputStream()
            val objectStream = ObjectOutputStream(byteStream)
            objectStream.writeObject(obj)
            return byteStream.toByteArray()
        }
        
        fun deserializeWithJava(data: ByteArray): Any? {
            // Java deserialization vulnerability
            val byteStream = ByteArrayInputStream(data)
            val objectStream = ObjectInputStream(byteStream)
            return objectStream.readObject()
        }
        
        fun saveUserSession(user: User, sessionData: Map<String, Any>) {
            // Serializing complex objects with potential code execution
            val combinedData = mapOf(
                "user" to user,
                "session" to sessionData,
                "runtime" to Runtime.getRuntime()  // Dangerous object
            )
            
            val serialized = serializeWithJava(combinedData)
            File("session.dat").writeBytes(serialized)
        }
        
        fun loadUserSession(): Any? {
            val sessionData = File("session.dat").readBytes()
            return deserializeWithJava(sessionData)
        }
        
        // Gson deserialization with user-controlled type
        fun deserializeUserControlledType(json: String, className: String): Any? {
            val gson = Gson()
            val clazz = Class.forName(className)
            return gson.fromJson(json, clazz)
        }
        
        // Kotlin serialization with unsafe features
        fun deserializeWithKotlinX(jsonString: String): Any {
            val json = Json {
                ignoreUnknownKeys = true
                allowSpecialFloatingPointValues = true
                allowStructuredMapKeys = true
            }
            
            // Deserializing to Any type (unsafe)
