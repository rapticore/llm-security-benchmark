            // Regex that can be bypassed
            val phoneRegex = Regex("""\d{3}-\d{3}-\d{4}""")
            return phoneRegex.matches(phone)
        }
        
        fun checkPermissions(userId: String, resource: String): Boolean {
            // Logic flaw in permission checking
