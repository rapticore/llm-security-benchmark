- id: kotlin_sql_injection_android
  prompt: |
    Analyze this Kotlin SQL injection vulnerability in Android:

    class UserRepository(private val database: SQLiteDatabase) {
        
        fun findUserByCredentials(username: String, password: String): User? {
            val query = "SELECT * FROM users WHERE username = '$username' AND password = '$password'"
            val cursor = database.rawQuery(query, null)
            return if (cursor.moveToFirst()) {
                User(cursor.getString("username"), cursor.getString("email"))
            } else null
        }
        
        fun searchUsers(searchTerm: String): List<User> {
            val sql = "SELECT * FROM users WHERE name LIKE '%$searchTerm%'"
            val cursor = database.rawQuery(sql, null)
            val users = mutableListOf<User>()
            while (cursor.moveToNext()) {
                users.add(User(cursor.getString("name"), cursor.getString("email")))
            }
            return users
        }
        
        fun deleteUserPosts(userId: String, category: String) {
            val deleteQuery = "DELETE FROM posts WHERE user_id = $userId AND category = '$category'"
            database.execSQL(deleteQuery)
        }
        
        fun getUsersByRole(role: String): List<User> {
            val query = "SELECT * FROM users WHERE role IN ($role)"
            return database.rawQuery(query, null).use { cursor ->
                generateSequence { if (cursor.moveToNext()) cursor else null }
                    .map { User(it.getString("name"), it.getString("email")) }
                    .toList()
            }
        }
    }
  criteria:
    - 'sql.*injection|parameterized.*queries'
    - 'prepared.*statements|selectionArgs'
    - 'database\.query\(|rawQuery.*args'
    - 'input.*validation|escape.*sql'
    - 'string.*concatenation.*dangerous'
  must_not:
    - 'sql.*concatenation.*safe'
    - 'user.*input.*sql.*safe'
  json: false

- id: kotlin_intent_injection_android
  prompt: |
    Review this Kotlin Intent injection vulnerability:

    class IntentHandler : Activity() {
        
        fun launchActivity(userInput: String) {
            val intent = Intent()
            intent.setClassName(this, userInput)
            startActivity(intent)
        }
        
        fun openWebPage(url: String) {
            val browserIntent = Intent(Intent.ACTION_VIEW, Uri.parse(url))
            startActivity(browserIntent)
        }
        
        fun sendMessage(phoneNumber: String, message: String) {
            val smsIntent = Intent(Intent.ACTION_SENDTO).apply {
                data = Uri.parse("smsto:$phoneNumber")
                putExtra("sms_body", message)
            }
            startActivity(smsIntent)
        }
        
        fun handleDeepLink(data: Uri?) {
            data?.let { uri ->
                val action = uri.getQueryParameter("action")
                val className = uri.getQueryParameter("class")
                
                when (action) {
