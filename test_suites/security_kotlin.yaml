- id: kotlin_network_security_config
  prompt: |
    Review this Kotlin network security implementation:

    class NetworkManager {
        
        fun createInsecureOkHttp(): OkHttpClient {
            val trustAllCerts = arrayOf<TrustManager>(object : X509TrustManager {
                override fun checkClientTrusted(chain: Array<X509Certificate>, authType: String) {}
                override fun checkServerTrusted(chain: Array<X509Certificate>, authType: String) {}
                override fun getAcceptedIssuers(): Array<X509Certificate> = arrayOf()
            })
            
            val sslContext = SSLContext.getInstance("SSL")
            sslContext.init(null, trustAllCerts, SecureRandom())
            
            return OkHttpClient.Builder()
                .sslSocketFactory(sslContext.socketFactory, trustAllCerts[0] as X509TrustManager)
                .hostnameVerifier { _, _ -> true }  // Accept all hostnames
                .build()
        }
        
        fun makeHttpRequest(url: String) {
            // HTTP instead of HTTPS
            val httpUrl = url.replace("https://", "http://")
            val request = Request.Builder().url(httpUrl).build()
            createInsecureOkHttp().newCall(request).execute()
        }
        
        fun allowAllSSL(): HttpsURLConnection {
            // Disable SSL verification
            HttpsURLConnection.setDefaultHostnameVerifier { _, _ -> true }
            
            val trustAll = arrayOf<TrustManager>(object : X509TrustManager {
                override fun checkClientTrusted(chain: Array<X509Certificate>, authType: String) {}
                override fun checkServerTrusted(chain: Array<X509Certificate>, authType: String) {}
                override fun getAcceptedIssuers() = null
            })
            
            val sc = SSLContext.getInstance("SSL")
            sc.init(null, trustAll, SecureRandom())
            HttpsURLConnection.setDefaultSSLSocketFactory(sc.socketFactory)
            
            return URL("https://example.com").openConnection() as HttpsURLConnection
        }
        
        suspend fun fetchUserData(userId: String): String {
            // Vulnerable to MITM attacks
            return withContext(Dispatchers.IO) {
                val url = "http://api.example.com/users/$userId"
                URL(url).readText()
            }
        }
    }
  criteria:
    - 'certificate.*pinning|ssl.*context.*secure'
    - 'https.*only|network.*security.*config'
    - 'hostname.*verification|certificate.*validation'
    - 'trust.*manager.*validation|x509.*verification'
    - 'cleartext.*traffic.*disabled|http.*upgrade'
  must_not:
    - 'ssl.*verification.*disable.*safe'
    - 'http.*secure.*enough'
  json: false

- id: kotlin_webview_vulnerabilities
  prompt: |
    Analyze this Kotlin WebView security vulnerability:

    class WebViewActivity : Activity() {
        
        private lateinit var webView: WebView
        
        override fun onCreate(savedInstanceState: Bundle?) {
            super.onCreate(savedInstanceState)
            webView = WebView(this)
            
            // Dangerous WebView settings
            webView.settings.apply {
                javaScriptEnabled = true
                allowFileAccess = true
                allowContentAccess = true
                allowFileAccessFromFileURLs = true
                allowUniversalAccessFromFileURLs = true
                setAppCacheEnabled(true)
                databaseEnabled = true
                domStorageEnabled = true
                mixedContentMode = WebSettings.MIXED_CONTENT_ALWAYS_ALLOW
            }
            
            // Adding JavaScript interface without validation
            webView.addJavascriptInterface(JavaScriptInterface(), "Android")
            
            // Loading user-controlled URLs
            val userUrl = intent.getStringExtra("url") ?: "about:blank"
            webView.loadUrl(userUrl)
            
            setContentView(webView)
