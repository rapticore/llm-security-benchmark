- id: kotlin_crypto_vulnerabilities
  prompt: |
    Analyze this Kotlin cryptographic implementation vulnerability:

    import javax.crypto.*
    import javax.crypto.spec.*
    import java.security.*
    import java.security.spec.*
    
    class CryptoManager {
        
        fun hashPasswordWeak(password: String): String {
            // Weak hashing algorithm
            val md = MessageDigest.getInstance("MD5")
            val hashBytes = md.digest(password.toByteArray())
            return hashBytes.joinToString("") { "%02x".format(it) }
        }
        
        fun encryptWithWeakKey(data: String): ByteArray {
            // Hard-coded weak key
            val key = "1234567890123456".toByteArray()
            val secretKey = SecretKeySpec(key, "AES")
            
            // ECB mode (patterns visible)
            val cipher = Cipher.getInstance("AES/ECB/PKCS5Padding")
            cipher.init(Cipher.ENCRYPT_MODE, secretKey)
            
            return cipher.doFinal(data.toByteArray())
        }
        
        fun generateWeakRandom(): String {
            // Predictable random number generation
            val random = Random()
            return random.nextInt(1000000).toString()
        }
        
        fun createInsecureSSL(): SSLContext {
            // Accepting all certificates
            val trustAllCerts = arrayOf<TrustManager>(object : X509TrustManager {
                override fun checkClientTrusted(chain: Array<X509Certificate>, authType: String) {}
                override fun checkServerTrusted(chain: Array<X509Certificate>, authType: String) {}
                override fun getAcceptedIssuers(): Array<X509Certificate>? = null
            })
            
            val sslContext = SSLContext.getInstance("SSL")
            sslContext.init(null, trustAllCerts, SecureRandom())
            return sslContext
        }
        
        fun verifySignatureInsecure(data: ByteArray, signature: ByteArray, publicKey: String): Boolean {
            // Vulnerable signature verification
            return signature.contentEquals(data.sliceArray(0..signature.size-1))
        }
        
        fun deriveKeyWeak(password: String, salt: ByteArray): SecretKey {
            // Weak key derivation
            val spec = PBEKeySpec(password.toCharArray(), salt, 100, 128)  // Low iteration count
            val factory = SecretKeyFactory.getInstance("PBKDF2WithHmacSHA1")  // Weak algorithm
            val key = factory.generateSecret(spec)
            return SecretKeySpec(key.encoded, "AES")
        }
        
        fun constantTimeComparison(a: String, b: String): Boolean {
            // Timing attack vulnerability - not constant time
            return a == b
        }
    }
  criteria:
    - 'weak.*hash.*md5.*sha1|bcrypt.*scrypt.*argon2'
    - 'secure.*random|securerandom.*cryptographic'
    - 'aes.*cbc.*gcm|avoid.*ecb.*mode'
    - 'key.*derivation.*pbkdf2|high.*iteration.*count'
    - 'constant.*time.*comparison|timing.*attack.*prevention'
  must_not:
    - 'md5.*secure.*hashing'
    - 'ecb.*mode.*acceptable'
  json: false

