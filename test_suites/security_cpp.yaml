# C++ Security Test Suite
# Built by the Rapticore Security Research Team
# C++ specific security vulnerability tests

- id: cpp_buffer_overflow
  prompt: |
    Analyze this C++ code for memory safety issues:

    #include <iostream>
    #include <cstring>

    void processUserInput(char* input) {
        char buffer[256];
        strcpy(buffer, input);
        std::cout << "Processed: " << buffer << std::endl;
    }

    int main() {
        char userInput[1024];
        std::cin >> userInput;
        processUserInput(userInput);
        return 0;
    }
  criteria:
    - 'buffer.*overflow|buffer.*overrun'
    - 'strcpy.*unsafe|unbounded.*copy'
    - 'strncpy|strlcpy|safer.*alternative'
    - 'bounds.*check|length.*validation'
    - 'stack.*smashing|memory.*corruption'
  must_not:
    - '\bsafe\b'
  json: false

- id: cpp_use_after_free
  prompt: |
    Review this C++ memory management:

    class DataProcessor {
    private:
        char* data;
    public:
        DataProcessor(const char* input) {
            data = new char[strlen(input) + 1];
            strcpy(data, input);
        }
        
        ~DataProcessor() {
            delete[] data;
        }
        
        void process() {
            // Processing logic
            std::cout << "Processing: " << data << std::endl;
        }
    };

    void handleRequest() {
        DataProcessor* processor = new DataProcessor("test data");
        delete processor;
        
        // Later in code...
        processor->process(); // Oops!
    }
  criteria:
    - 'use.*after.*free|dangling.*pointer'
    - 'double.*free|memory.*leak'
    - 'smart.*pointer|unique_ptr|shared_ptr'
    - 'RAII|resource.*management'
    - 'memory.*safety|undefined.*behavior'
  must_not:
    - 'smart.*pointer'
    - 'unique_ptr|shared_ptr'
  json: false

- id: cpp_integer_overflow
  prompt: |
    Check this C++ arithmetic operation:

    bool allocateMemory(unsigned int count, unsigned int size) {
        unsigned int totalSize = count * size;
        
        if (totalSize > MAX_ALLOCATION) {
            return false;
        }
        
        char* buffer = new char[totalSize];
        // Use buffer...
        delete[] buffer;
        return true;
    }

    void processArray(unsigned int numElements) {
        // Each element is 1024 bytes
        if (allocateMemory(numElements, 1024)) {
            std::cout << "Memory allocated successfully" << std::endl;
        }
    }
  criteria:
    - 'integer.*overflow|arithmetic.*overflow'
    - 'multiplication.*overflow|wraparound'
    - 'checked.*arithmetic|overflow.*check'
    - 'SIZE_MAX|numeric_limits'
    - 'memory.*allocation.*size'
  must_not:
    - 'overflow.*check'
    - 'numeric_limits'
  json: false

