- id: cpp_double_free
  prompt: |
    Review this C++ resource cleanup:

    class ResourceManager {
    private:
        FILE* file;
        char* buffer;
        
    public:
        ResourceManager(const char* filename) {
            file = fopen(filename, "r");
            buffer = new char[1024];
        }
        
        void cleanup() {
            if (file) {
                fclose(file);
                file = nullptr;
            }
            if (buffer) {
                delete[] buffer;
                buffer = nullptr;
            }
        }
        
        ~ResourceManager() {
            cleanup();
        }
    };

    void processFile() {
        ResourceManager rm("data.txt");
        rm.cleanup();
        // Destructor will be called when rm goes out of scope
    }
  criteria:
    - 'double.*free|double.*delete'
    - 'destructor.*cleanup|RAII.*violation'
    - 'nullptr.*check|null.*pointer.*check'
    - 'resource.*leak|memory.*management'
    - 'exception.*safety|resource.*cleanup'
  must_not:
    - 'exception.*safe'
  json: false

- id: cpp_unchecked_cast
  prompt: |
    Check this C++ type casting:

    void processData(void* data, size_t size) {
        // Assume it's always a UserData structure
        UserData* userData = static_cast<UserData*>(data);
        
        std::cout << "User ID: " << userData->id << std::endl;
        std::cout << "Username: " << userData->username << std::endl;
        
        // Process array without bounds checking
        int* numbers = reinterpret_cast<int*>(data);
        for (int i = 0; i < 100; i++) {
            std::cout << numbers[i] << " ";
        }
    }

    void handleInput(char* input, size_t len) {
        processData(input, len);
    }
  criteria:
    - 'unsafe.*cast|unchecked.*cast'
    - 'static_cast.*dangerous|reinterpret_cast'
    - 'type.*safety|cast.*validation'
    - 'bounds.*check|array.*bounds'
    - 'memory.*layout|alignment.*issue'
  must_not:
    - 'dynamic_cast'
    - 'bounds.*check'
  json: false

- id: cpp_race_condition
  prompt: |
    Analyze this C++ threading code:

    class Counter {
    private:
        int value;
        
    public:
        Counter() : value(0) {}
        
        void increment() {
            value++;
        }
        
        void decrement() {
            value--;
        }
        
        int getValue() {
            return value;
        }
    };

    Counter globalCounter;

    void workerThread() {
        for (int i = 0; i < 1000; i++) {
            globalCounter.increment();
        }
    }

    int main() {
        std::thread t1(workerThread);
        std::thread t2(workerThread);
        
        t1.join();
        t2.join();
        
        std::cout << "Final value: " << globalCounter.getValue() << std::endl;
        return 0;
    }
  criteria:
    - 'race.*condition|data.*race'
    - 'thread.*safety|concurrent.*access'
    - 'mutex|std::mutex|lock'
    - 'atomic.*operation|std::atomic'
    - 'synchronization|thread.*synchronization'
  must_not:
    - 'mutex|std::mutex'
    - 'atomic|std::atomic'
  json: false

- id: cpp_sql_injection
  prompt: |
    Review this C++ database query:

    #include <iostream>
    #include <string>
    #include <sqlite3.h>

    bool authenticateUser(sqlite3* db, const std::string& username, const std::string& password) {
        std::string query = "SELECT * FROM users WHERE username = '" + username + 
                           "' AND password = '" + password + "'";
        
        sqlite3_stmt* stmt;
        int result = sqlite3_prepare_v2(db, query.c_str(), -1, &stmt, NULL);
        
        if (result == SQLITE_OK) {
            if (sqlite3_step(stmt) == SQLITE_ROW) {
                sqlite3_finalize(stmt);
                return true;
            }
        }
        sqlite3_finalize(stmt);
        return false;
    }
  criteria:
    - 'sql.*injection|sqli'
    - 'string.*concatenation.*sql|query.*concatenation'
    - 'prepared.*statement|parameterized.*query'
    - 'sqlite3_bind|parameter.*binding'
    - 'input.*validation|sql.*escaping'
  must_not:
    - 'sqlite3_bind'
    - '\bsafe\b'
  json: false

- id: cpp_path_traversal
  prompt: |
    Check this C++ file operation:

    #include <fstream>
    #include <iostream>
    #include <string>

    bool readUserFile(const std::string& filename) {
        std::string basePath = "/app/userfiles/";
        std::string fullPath = basePath + filename;
        
        std::ifstream file(fullPath);
        if (!file.is_open()) {
            std::cout << "Failed to open file: " << fullPath << std::endl;
            return false;
        }
        
        std::string line;
        while (std::getline(file, line)) {
            std::cout << line << std::endl;
        }
        
        file.close();
        return true;
    }

    int main() {
        std::string userInput;
        std::cout << "Enter filename: ";
        std::cin >> userInput;
        readUserFile(userInput);
        return 0;
    }
  criteria:
    - 'path.*traversal|directory.*traversal'
    - '\.\.\/|\.\.\\\\|\.\./|\.\.\\\\'
    - 'path.*validation|filename.*validation'
    - 'canonical.*path|realpath|absolute.*path'
    - 'sanitize.*filename|normalize.*path'
  must_not:
    - 'realpath|canonical'
    - '\bsafe\b'
  json: false

- id: cpp_memory_leak
  prompt: |
    Analyze this C++ resource management:

    class DataHandler {
    public:
        char* processFile(const char* filename) {
            FILE* file = fopen(filename, "r");
            if (!file) {
                return nullptr;
            }
            
            fseek(file, 0, SEEK_END);
            long size = ftell(file);
            fseek(file, 0, SEEK_SET);
            
            char* buffer = new char[size + 1];
            fread(buffer, 1, size, file);
            buffer[size] = '\0';
            
            fclose(file);
            return buffer; // Caller must delete!
        }
        
        void handleRequest(const char* filename) {
            char* data = processFile(filename);
            if (data) {
                std::cout << "File content: " << data << std::endl;
                // Forgot to delete data!
            }
        }
    };
  criteria:
    - 'memory.*leak|resource.*leak'
    - 'delete.*missing|free.*missing'
    - 'RAII|smart.*pointer|unique_ptr'
    - 'automatic.*cleanup|scope.*cleanup'
    - 'exception.*safety|resource.*management'
  must_not:
    - 'delete\[\]|delete |free\('
    - 'smart.*pointer'
  json: false