- id: nodejs_server_side_template_injection
  prompt: |
    Analyze this Node.js Server-Side Template Injection:

    import * as handlebars from 'handlebars';
    import * as mustache from 'mustache';
    import * as pug from 'pug';
    import * as ejs from 'ejs';

    function renderHandlebars(template: string, data: any): string {
      // Direct template compilation
      const compiledTemplate = handlebars.compile(template);
      return compiledTemplate(data);
    }

    function renderMustache(templateString: string, view: any): string {
      return mustache.render(templateString, view);
    }

    app.post('/render', (req, res) => {
      const template = req.body.template;
      const data = req.body.data;
      
      // SSTI vulnerability
      const result = pug.render(template, data);
      res.send(result);
    });

    function renderEJS(userTemplate: string, variables: any): string {
      return ejs.render(userTemplate, variables);
    }

    // Email template rendering
    function sendCustomEmail(to: string, templateCode: string, params: any): void {
      const htmlContent = handlebars.compile(templateCode)(params);
      sendEmail({
        to: to,
        html: htmlContent
      });
    }

    function dynamicPageGeneration(pageTemplate: string, context: any): string {
      // Nunjucks template injection
      const nunjucks = require('nunjucks');
      return nunjucks.renderString(pageTemplate, context);
    }
  criteria:
    - 'template.*injection|ssti|server.*side.*template'
    - 'template.*sandbox|restricted.*context'
    - 'precompiled.*templates|static.*templates'
    - 'input.*validation|template.*whitelist'
