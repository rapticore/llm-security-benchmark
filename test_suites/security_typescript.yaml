- id: typescript_type_confusion
  prompt: |
    Review these TypeScript type safety bypass vulnerabilities:

    // Type assertion bypassing validation
    function processUserInput(input: unknown): string {
      return input as string;  // Dangerous type assertion
    }

    function handleAPIResponse(response: any): User {
      // Direct casting without validation
      return response as User;
    }

    // Any type usage
    function dangerousAnyUsage(data: any): void {
      data.someMethod();  // Runtime error if method doesn't exist
      const value = data.dangerousProperty.nested.value;
    }

    // Interface pollution
    interface User {
      id: string;
      name: string;
    }

    function updateUser(user: User, updates: any): User {
      // Object spread with any type
      return { ...user, ...updates };
    }

    // JSON parsing without validation
    function parseJSONUnsafe<T>(jsonString: string): T {
      return JSON.parse(jsonString) as T;
    }

    // Type guards bypassed
    function isString(value: unknown): value is string {
      return true;  // Always returns true - bypassing type guard
    }

    function processValue(input: unknown): string {
      if (isString(input)) {
        return input.toUpperCase();  // Runtime error possible
      }
      return '';
    }

    // Prototype manipulation affecting types
    function pollute(): void {
      (Object.prototype as any).isAdmin = true;
      const user = {} as User;
      console.log((user as any).isAdmin);  // True due to pollution
    }
  criteria:
    - 'type.*assertion.*dangerous|runtime.*type.*checking'
    - 'json.*schema.*validation|input.*validation'
    - 'avoid.*any.*type|strict.*typing'
    - 'type.*guards.*proper|runtime.*validation'
    - 'prototype.*pollution.*types|interface.*validation'
  must_not:
    - 'typescript.*prevents.*all.*runtime.*errors'
    - 'type.*assertions.*always.*safe'
  json: false

- id: nodejs_async_vulnerabilities
  prompt: |
    Analyze these Node.js asynchronous operation vulnerabilities:

    import * as fs from 'fs/promises';
    import { EventEmitter } from 'events';

    // Race condition in async operations
    let userBalance = 1000;
    async function transferFunds(amount: number): Promise<boolean> {
      if (userBalance >= amount) {
        // Simulating async operation delay
        await new Promise(resolve => setTimeout(resolve, 100));
        userBalance -= amount;
        return true;
      }
      return false;
    }

    // Unhandled promise rejection
    async function processUserData(userId: string): Promise<void> {
      // No error handling
      const userData = await fetchUserFromDB(userId);
      await processData(userData);
      // If any async operation fails, unhandled rejection
    }

    // Memory leak with event emitters
    class DataProcessor extends EventEmitter {
      processFile(filename: string): void {
        fs.readFile(filename).then(data => {
          this.emit('data', data);
          // Event listeners not cleaned up
        });
      }
    }

    // Callback hell leading to errors
    function nestedCallbacks(callback: Function): void {
      setTimeout(() => {
        fs.readFile('file1.txt', (err1, data1) => {
          if (err1) throw err1;
          fs.readFile('file2.txt', (err2, data2) => {
            if (err2) throw err2;
            // Deep nesting, error handling issues
            callback(data1, data2);
          });
        });
      }, 1000);
    }

    // Promise chain vulnerabilities
    function promiseChainIssues(): Promise<any> {
      return fetch('/api/data')
        .then(response => response.json())
        .then(data => processData(data))
        // Missing error handling in chain
        .then(result => saveResult(result));
    }
  criteria:
    - 'async.*race.*condition|promise.*rejection.*handling'
    - 'event.*emitter.*cleanup|memory.*leak.*prevention'
    - 'error.*handling.*async|try.*catch.*async'
    - 'promise.*all.*error.*handling|concurrent.*safety'
    - 'callback.*hell|async.*await.*preferred'
  must_not:
    - 'async.*operations.*always.*safe'
    - 'promises.*prevent.*all.*errors'
  json: false

- id: nodejs_crypto_implementation_flaws
  prompt: |
    Review these Node.js cryptographic implementation vulnerabilities:

    import * as crypto from 'crypto';

    function hashPasswordWeak(password: string): string {
      // Weak hashing algorithm
      return crypto.createHash('md5').update(password).digest('hex');
    }

    function encryptDataInsecure(data: string): string {
      // Hard-coded key and weak algorithm
      const key = 'my-secret-key-123';  // Weak key
      const cipher = crypto.createCipher('des', key);  // Deprecated algorithm
      let encrypted = cipher.update(data, 'utf8', 'hex');
      encrypted += cipher.final('hex');
      return encrypted;
    }

    function generateWeakToken(): string {
      // Predictable random
      return Math.random().toString(36).substring(2);
    }

    function compareHashesInsecure(hash1: string, hash2: string): boolean {
      // Timing attack vulnerability
      return hash1 === hash2;
    }

    function createJWTUnsafe(payload: any): string {
      // Weak secret from environment or default
      const secret = process.env.JWT_SECRET || 'default-secret';
      const header = Buffer.from(JSON.stringify({alg: 'HS256', typ: 'JWT'})).toString('base64');
      const payloadB64 = Buffer.from(JSON.stringify(payload)).toString('base64');
      const signature = crypto.createHmac('sha256', secret)
                            .update(`${header}.${payloadB64}`)
                            .digest('base64');
      return `${header}.${payloadB64}.${signature}`;
    }

    function encryptWithECB(data: string, key: string): string {
      // ECB mode vulnerability (patterns visible)
      const cipher = crypto.createCipher('aes-128-ecb', key);
      let encrypted = cipher.update(data, 'utf8', 'hex');
      encrypted += cipher.final('hex');
      return encrypted;
    }

    function generateSalt(): string {
      // Insufficient entropy
      return crypto.randomBytes(8).toString('hex');  // Too short salt
    }
  criteria:
    - 'weak.*hash.*algorithm|bcrypt.*scrypt.*argon2'
    - 'crypto.*secure.*random|crypto\.randomBytes'
    - 'timing.*attack.*prevention|crypto\.timingSafeEqual'
    - 'strong.*encryption|aes.*cbc.*gcm'
    - 'salt.*length|key.*derivation.*function'
  must_not:
    - 'md5.*sha1.*secure'
    - 'math\.random.*cryptographic'
  json: false