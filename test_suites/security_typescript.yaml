# TypeScript/Node.js Comprehensive Security Test Suite
# Built by the Rapticore Security Research Team
# Covers TypeScript and Node.js specific vulnerabilities

- id: typescript_prototype_pollution
  prompt: |
    Analyze this TypeScript prototype pollution vulnerability:

    interface UserPreferences {
      theme: string;
      language: string;
    }

    function mergeUserSettings(target: any, source: any): UserPreferences {
      for (let key in source) {
        if (typeof source[key] === 'object' && source[key] !== null) {
          target[key] = target[key] || {};
          mergeUserSettings(target[key], source[key]);
        } else {
          target[key] = source[key];
        }
      }
      return target;
    }

    // Express.js usage
    app.post('/settings', (req, res) => {
      const userSettings = mergeUserSettings({}, req.body);
      res.json(userSettings);
    });

    // Lodash-style merge
    function deepMerge(target: Record<string, any>, ...sources: any[]): any {
      return sources.reduce((acc, source) => {
        Object.keys(source).forEach(key => {
          acc[key] = source[key];
        });
        return acc;
      }, target);
    }
  criteria:
    - 'prototype.*pollution|__proto__.*assignment'
    - 'object.*freeze|preventExtensions'
    - 'hasOwnProperty.*check|propertyIsEnumerable'
    - 'whitelist.*keys|allowed.*properties'
    - 'constructor.*prototype.*pollution'
  must_not:
    - 'prototype.*pollution.*impossible'
    - 'safe.*by.*default'
  json: false

- id: nodejs_command_injection
  prompt: |
    Review this Node.js command injection vulnerability:

    import { exec, spawn } from 'child_process';
    import * as fs from 'fs';

    function convertImage(inputFile: string, outputFormat: string): Promise<string> {
      return new Promise((resolve, reject) => {
        exec(`convert ${inputFile} output.${outputFormat}`, (error, stdout, stderr) => {
          if (error) reject(error);
          else resolve(stdout);
        });
      });
    }

    function gitClone(repoUrl: string, destination: string): void {
      const command = `git clone ${repoUrl} ${destination}`;
      exec(command, (error, stdout, stderr) => {
        console.log(stdout);
      });
    }

    // Express route
    app.get('/ping/:host', (req, res) => {
      const host = req.params.host;
      exec(`ping -c 4 ${host}`, (error, stdout, stderr) => {
        res.send(stdout);
      });
    });

    function processFile(filename: string, operation: string): void {
      spawn('sh', ['-c', `${operation} ${filename}`]);
    }
  criteria:
    - 'command.*injection|shell.*injection'
    - 'spawn.*array.*args|execFile.*safer'
    - 'shell.*false|avoid.*shell.*execution'
    - 'input.*validation|sanitize.*commands'
    - 'whitelist.*commands|allowed.*operations'
  must_not:
    - 'exec.*shell.*safe'
    - 'user.*input.*shell.*safe'
  json: false

- id: nodejs_path_traversal
  prompt: |
    Analyze this Node.js path traversal vulnerability:

    import * as path from 'path';
    import * as fs from 'fs';
    import express from 'express';

    const app = express();

    app.get('/files/:filename', (req, res) => {
      const filename = req.params.filename;
      const filePath = `./uploads/${filename}`;
      res.sendFile(filePath);
    });

    function readUserFile(relativePath: string): string {
      const fullPath = path.join(__dirname, 'data', relativePath);
      return fs.readFileSync(fullPath, 'utf8');
    }

    app.get('/download', (req, res) => {
      const file = req.query.file as string;
      const downloadPath = path.resolve('./downloads/' + file);
      res.download(downloadPath);
    });

    function serveStaticContent(requestPath: string): Buffer {
      const contentPath = './static' + requestPath;
      return fs.readFileSync(contentPath);
    }

    // Archive extraction
    function extractFile(archivePath: string, extractTo: string): void {
      const tar = require('tar');
      tar.extract({
        file: archivePath,
        cwd: extractTo
      });
    }
  criteria:
    - 'path.*traversal|directory.*traversal'
    - 'path\.normalize|path\.resolve.*validate'
    - 'path\.join.*safe|basename.*extraction'
    - 'whitelist.*directories|allowed.*paths'
    - '\.\./|\.\.\\\\|parent.*directory'
  must_not:
    - 'path.*traversal.*impossible'
    - 'path\.join.*always.*safe'
  json: false

- id: typescript_nosql_injection
  prompt: |
    Review this TypeScript NoSQL injection in MongoDB:

    import { MongoClient, Db } from 'mongodb';

    interface User {
      _id?: string;
      username: string;
      email: string;
    }

    class UserService {
      constructor(private db: Db) {}

      async findUser(username: string, password: string): Promise<User | null> {
        // Direct object injection
        const query = { username: username, password: password };
        return await this.db.collection('users').findOne(query);
      }

      async searchUsers(filters: any): Promise<User[]> {
        // Raw filter object from request
        return await this.db.collection('users').find(filters).toArray();
      }

      async deleteUserPosts(userId: string, conditions: any): Promise<void> {
        await this.db.collection('posts').deleteMany({
          userId: userId,
          ...conditions  // Spread operator vulnerability
        });
      }

      async updateUser(id: string, updateData: any): Promise<void> {
        // Direct update object
        await this.db.collection('users').updateOne(
          { _id: id },
          { $set: updateData }
        );
      }
    }

    // Express route
    app.post('/users/search', async (req, res) => {
      const userService = new UserService(db);
      const results = await userService.searchUsers(req.body);
      res.json(results);
    });
  criteria:
    - 'nosql.*injection|mongodb.*injection'
    - 'query.*validation|input.*sanitization'
    - '\$where.*javascript|eval.*injection'
    - 'type.*checking|schema.*validation'
    - 'mongo.*escape|parameterized.*queries'
  must_not:
    - 'nosql.*injection.*impossible'
    - 'mongodb.*always.*safe'
  json: false

- id: nodejs_xxe_xml_processing
  prompt: |
    Analyze this Node.js XML External Entity vulnerability:

    import * as xml2js from 'xml2js';
    import * as libxmljs from 'libxmljs';
    import * as fast_xml_parser from 'fast-xml-parser';

    function parseUserXML(xmlContent: string): Promise<any> {
      const parser = new xml2js.Parser();
      return parser.parseStringPromise(xmlContent);
    }

    function processXMLWithLibxml(xmlString: string): any {
      const doc = libxmljs.parseXml(xmlString);
      return doc.root();
    }

    function fastXMLParse(xmlData: string): any {
      const options = {
        ignoreAttributes: false,
        parseNodeValue: true,
        parseAttributeValue: true
      };
      return fast_xml_parser.parse(xmlData, options);
    }

    // SOAP service handling
    app.post('/soap', (req, res) => {
      const soapXML = req.body;
      const parsedSOAP = parseUserXML(soapXML);
      res.json(parsedSOAP);
    });

    function processConfigFile(configPath: string): any {
      const xmlContent = fs.readFileSync(configPath, 'utf8');
      return libxmljs.parseXml(xmlContent, {
        noblanks: true,
        noent: true,  // Dangerous: enables entity processing
        nocdata: true
      });
    }
  criteria:
    - 'xml.*external.*entity|xxe.*vulnerability'
    - 'disable.*entities|noent.*false'
    - 'resolve_entities.*false|external.*dtd'
    - 'entity.*expansion|billion.*laughs'
    - 'xml.*parser.*secure.*configuration'
  must_not:
    - 'xml.*parsing.*always.*safe'
    - 'no.*xxe.*risk.*nodejs'
  json: false

- id: typescript_jwt_vulnerabilities
  prompt: |
    Review these TypeScript JWT implementation vulnerabilities:

    import * as jwt from 'jsonwebtoken';
    import * as crypto from 'crypto';

    interface JWTPayload {
      userId: string;
      role: string;
      exp?: number;
    }

    function generateToken(payload: JWTPayload): string {
      // Weak secret
      return jwt.sign(payload, 'secret123');
    }

    function verifyTokenUnsafe(token: string): JWTPayload | null {
      try {
        // Algorithm confusion vulnerability
        return jwt.verify(token, 'secret123') as JWTPayload;
      } catch {
        return null;
      }
    }

    function createUnsignedToken(payload: JWTPayload): string {
      // None algorithm vulnerability
      return jwt.sign(payload, '', { algorithm: 'none' as any });
    }

    // Express middleware
    function authenticateToken(req: any, res: any, next: any): void {
      const token = req.headers.authorization?.split(' ')[1];
      if (!token) {
        return res.status(401).json({ error: 'No token' });
      }

      // Vulnerable verification
      const decoded = jwt.decode(token) as JWTPayload;
      req.user = decoded;
      next();
    }

    function refreshToken(oldToken: string): string {
      // No verification of old token
      const payload = jwt.decode(oldToken) as JWTPayload;
      return jwt.sign(payload, process.env.JWT_SECRET || 'fallback_secret');
    }
  criteria:
    - 'jwt.*vulnerability|algorithm.*confusion'
    - 'strong.*secret|crypto.*random.*secret'
    - 'algorithm.*whitelist|verify.*signature'
    - 'none.*algorithm.*dangerous|unsigned.*token'
    - 'token.*expiration|secure.*storage'
  must_not:
    - 'jwt.*always.*secure'
    - 'algorithm.*none.*safe'
  json: false

- id: nodejs_regex_dos
  prompt: |
    Analyze this Node.js Regular Expression Denial of Service:

    function validateEmail(email: string): boolean {
      // Catastrophic backtracking
      const emailRegex = /^([a-zA-Z0-9_\.-])+@([\da-z\.-])+\.([a-z\.]{2,6})$/;
      return emailRegex.test(email);
    }

    function parseNestedGroups(input: string): RegExpMatchArray | null {
      // Exponential backtracking
      const regex = /^(a+)+$/;
      return input.match(regex);
    }

    app.post('/validate', (req, res) => {
      const userInput = req.body.data;
      // User-controlled regex
      const pattern = req.body.pattern;
      try {
        const regex = new RegExp(pattern);
        const isValid = regex.test(userInput);
        res.json({ valid: isValid });
      } catch (error) {
        res.status(400).json({ error: 'Invalid pattern' });
      }
    });

    function extractNumbers(text: string): string[] {
      // Nested quantifiers
      const numberRegex = /(\d+(\.\d+)?)+/g;
      return text.match(numberRegex) || [];
    }

    function validateComplexInput(input: string): boolean {
      // Multiple vulnerable patterns
      const patterns = [
        /^(a|a)*$/,
        /^(a+)+$/,
        /^(a|b)*c$/,
        /^((a+)+)+$/
      ];
      
      return patterns.every(pattern => pattern.test(input));
    }
  criteria:
    - 'regex.*dos|catastrophic.*backtracking'
    - 'regex.*timeout|safe.*regex.*library'
    - 'nested.*quantifiers|exponential.*complexity'
    - 'user.*input.*regex|dynamic.*patterns'
    - 'regex.*validation|performance.*testing'
  must_not:
    - 'regex.*dos.*impossible'
    - 'all.*regex.*safe.*nodejs'
  json: false

