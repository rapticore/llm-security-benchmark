# =================== BUSINESS LOGIC FLAWS ===================
- id: race_condition
  prompt: |
    Analyze this account transfer logic:

    @app.route('/transfer', methods=['POST'])
    @login_required
    def transfer_money():
        from_account = request.json.get('from_account')
        to_account = request.json.get('to_account')
        amount = float(request.json.get('amount'))

        # Check balance
        sender = get_account(from_account)
        if sender.balance >= amount:
            # Deduct from sender
            sender.balance -= amount
            sender.save()

            # Add to recipient  
            recipient = get_account(to_account)
            recipient.balance += amount
            recipient.save()

            return {"status": "success"}

        return {"error": "Insufficient funds"}, 400
  criteria:
    - 'race.*condition|concurrency'
    - 'atomic.*transaction|database.*transaction'
    - 'lock|mutex|synchronized'
    - 'TOCTOU|time.*of.*check'
    - 'thread.*safe|concurrent.*access'
  must_not:
    - '\batomic\b'
    - '\btransaction\b'
  json: false

