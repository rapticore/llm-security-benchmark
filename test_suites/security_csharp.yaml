    - 'System\.Random.*security|deterministic.*random'
    - 'session.*token.*predictable|api.*key.*predictable'
    - 'entropy|randomness.*quality'
  must_not:
    - 'RNGCryptoServiceProvider'
    - 'RandomNumberGenerator'
  json: false

- id: csharp_mass_assignment
  prompt: |
    Review this C# model binding:

    [ApiController]
    public class UserController : ControllerBase
    {
        [HttpPost]
        public IActionResult CreateUser([FromBody] User user)
        {
            // Direct model binding without validation
            _context.Users.Add(user);
            _context.SaveChanges();
            
            return Ok(user);
        }
        
        [HttpPut("{id}")]
        public IActionResult UpdateUser(int id, [FromBody] JObject updates)
        {
            var user = _context.Users.Find(id);
            if (user == null) return NotFound();
            
            // Apply all JSON properties to user object
            foreach (var property in updates.Properties())
            {
                var prop = typeof(User).GetProperty(property.Name, 
                    BindingFlags.IgnoreCase | BindingFlags.Public | BindingFlags.Instance);
                if (prop != null && prop.CanWrite)
                {
                    prop.SetValue(user, property.Value.ToObject(prop.PropertyType));
                }
            }
            
            _context.SaveChanges();
            return Ok(user);
        }
    }
  criteria:
    - 'mass.*assignment|over.*posting'
    - 'privilege.*escalation|role.*modification'
    - '[Bind].*attribute|[BindNever]'
    - 'model.*validation|property.*validation'
    - 'sensitive.*field.*modification'
  must_not:
    - '\[Bind\]|\[BindNever\]'
    - 'model.*validation'
  json: false

- id: csharp_open_redirect
  prompt: |
    Check this C# redirect implementation:

    public class AccountController : Controller
    {
        [HttpPost]
        public ActionResult Login(string username, string password, string returnUrl)
        {
            if (ValidateUser(username, password))
            {
                if (!string.IsNullOrEmpty(returnUrl))
                {
                    return Redirect(returnUrl);
                }
                return RedirectToAction("Dashboard", "Home");
            }
            
            return View();
        }
        
        public ActionResult ExternalLink(string url)
        {
            // Redirect to any external URL
            Response.Redirect(url);
            return null;
        }
        
        public ActionResult SafeRedirect(string target)
        {
            // Attempt to validate but insufficient
            if (target.StartsWith("http://") || target.StartsWith("https://"))
            {
                return Redirect(target);
            }
            return RedirectToAction("Home");
        }
    }
  criteria:
    - 'open.*redirect|unvalidated.*redirect'
    - 'phishing.*attack|redirect.*validation'
    - 'whitelist.*domains|allowed.*urls'
    - 'Uri\.IsWellFormedUriString|domain.*validation'
    - 'external.*redirect.*risk'
  must_not:
    - 'domain.*validation'
    - 'whitelist'
  json: false

- id: csharp_information_disclosure
  prompt: |
    Analyze this C# error handling:

    public class ApiController : ControllerBase
    {
        [HttpGet("{id}")]
        public IActionResult GetUser(int id)
        {
            try
            {
                var user = _userService.GetById(id);
                return Ok(user);
            }
            catch (SqlException ex)
            {
                return BadRequest(new
                {
                    Error = "Database error occurred",
                    Details = ex.Message,
                    Query = ex.Procedure,
                    ServerName = ex.Server,
                    StackTrace = ex.StackTrace
                });
            }
            catch (Exception ex)
            {
                return StatusCode(500, new
                {
                    Error = ex.Message,
                    InnerException = ex.InnerException?.Message,
                    StackTrace = ex.StackTrace,
                    Environment = Environment.MachineName,
                    ConnectionString = _configuration.GetConnectionString("DefaultConnection")
                });
            }
        }
    }
  criteria:
    - 'information.*disclosure|data.*leakage'
    - 'stack.*trace.*exposure|exception.*details'
    - 'connection.*string.*exposure|server.*name'
    - 'generic.*error.*message|sanitize.*error'
    - 'sensitive.*information.*exposure'
  must_not:
    - 'generic.*error'
    - '\bsafe\b'
  json: false